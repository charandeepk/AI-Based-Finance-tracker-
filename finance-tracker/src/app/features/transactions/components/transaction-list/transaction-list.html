<div class="transaction-list">
    <div class="transaction-list__header">
        <h2 class="transaction-list__title">Recent Transactions</h2>
        <a routerLink="/transactions" class="transaction-list__viewall">View All
            →</a>
    </div>

    <div class="empty" *ngIf="transactions.length === 0">
        <p>No transactions yet. Add one to get started.</p>
    </div>

    <div class="transaction-list__scroll" *ngIf="transactions.length > 0">
        <div class="transaction-item"
            *ngFor="let t of transactions | slice:0:5">
            <div class="transaction-item__left">
                <span class="transaction-item__category">{{ t.category }}</span>
                <span class="transaction-item__description">{{ t.description ||
                    'No description' }}</span>
                <span class="transaction-item__date">{{ t.date }}</span>
            </div>
            <div class="transaction-item__right">
                <span class="transaction-item__amount"
                    [class.income]="t.type === 'income'"
                    [class.expense]="t.type === 'expense'">
                    {{ t.type === 'income' ? '+' : '-' }}₹{{ t.amount | number
                    }}
                </span>
            </div>
        </div>
    </div>
</div>
