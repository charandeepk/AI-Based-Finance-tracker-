<div class="form-container">
    <h2 class="form-container__title">Add Transaction</h2>

    <form [formGroup]="transactionForm" (ngSubmit)="onSubmit()">

        <div class="form-group">
            <label>Type</label>
            <div class="toggle">
                <button type="button"
                    [class.active]="transactionForm.get('type')?.value === 'income'"
                    (click)="setType('income')">
                    Income
                </button>
                <button type="button"
                    [class.active]="transactionForm.get('type')?.value === 'expense'"
                    (click)="setType('expense')">
                    Expense
                </button>
            </div>
        </div>

        <div class="form-group">
            <label>Amount (₹)</label>
            <input type="number" formControlName="amount"
                placeholder="Enter amount" />
            <span class="error"
                *ngIf="transactionForm.get('amount')?.invalid && transactionForm.get('amount')?.touched">
                Amount is required
            </span>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select formControlName="category">
                <option value="">Select category</option>
                <option *ngFor="let category of getCategoriesForType(transactionForm.get('type')?.value || 'expense')"
                    [value]="category">
                    {{ category | titlecase }}
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Description</label>
            <input type="text" formControlName="description"
                placeholder="What was this for?" />
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date" formControlName="date" />
        </div>

        <button type="submit" class="btn-submit"
            [disabled]="transactionForm.invalid">
            Add Transaction
        </button>

    </form>
</div>
